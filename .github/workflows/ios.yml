name: iOS — Nightly TestFlight

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC = 11 PM PT / 2 AM ET — nightly
  workflow_dispatch:       # manual trigger anytime

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.diff.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last tag
        id: diff
        run: |
          LAST_TAG=$(git tag -l 'ios-build-*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "No previous build tag — building"
          elif [ "$(git rev-list $LAST_TAG..HEAD --count)" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "$(git rev-list $LAST_TAG..HEAD --count) new commits since $LAST_TAG"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes since $LAST_TAG — skipping build"
          fi

  build:
    needs: check
    if: needs.check.outputs.has_changes == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ios

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog from commits
        id: changelog
        run: |
          cd ..
          LAST_TAG=$(git tag -l 'ios-build-*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD~20..HEAD"
          else
            RANGE="$LAST_TAG..HEAD"
          fi
          CHANGELOG=$(git log $RANGE --pretty=format:"• %s" --no-merges | head -30)
          echo "changelog<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG"

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.6'
          bundler-cache: true
          working-directory: ios

      - name: Install xcodegen
        run: brew install xcodegen || true

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up SSH for match
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$MATCH_SSH_KEY" > ~/.ssh/match_key
          chmod 600 ~/.ssh/match_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/match_key"
        env:
          MATCH_SSH_KEY: ${{ secrets.MATCH_SSH_KEY }}

      - name: Build & upload to TestFlight
        run: bundle exec fastlane beta
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.ASC_KEY_CONTENT }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}

      - name: Tag this build
        run: |
          cd ..
          BUILD_NUM=$(git rev-list --count HEAD)
          git tag "ios-build-${BUILD_NUM}"
          git push origin "ios-build-${BUILD_NUM}"
