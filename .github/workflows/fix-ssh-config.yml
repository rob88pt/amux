name: Fix SSH config

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CLOUD_SSH_KEY }}" > ~/.ssh/amux_cloud
          chmod 600 ~/.ssh/amux_cloud
          ssh-keyscan -H 5.161.66.217 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Fix sshd config
        run: |
          ssh -i ~/.ssh/amux_cloud root@5.161.66.217 'bash -s' << 'ENDSSH'
            # Re-enable PAM (needed for key auth on Ubuntu)
            sed -i 's/^UsePAM.*/UsePAM yes/' /etc/ssh/sshd_config

            # Keep password auth disabled
            grep -q "^PasswordAuthentication no" /etc/ssh/sshd_config || \
              sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config

            # Keep MaxStartups restrictive
            grep -q "^MaxStartups" /etc/ssh/sshd_config || \
              echo "MaxStartups 3:50:10" >> /etc/ssh/sshd_config

            # Verify config is valid
            sshd -t && echo "sshd config OK" || echo "sshd config INVALID"

            # Restart sshd
            systemctl restart ssh
            echo "sshd restarted"

            # Verify fail2ban is running
            systemctl status fail2ban --no-pager | head -5

            # Add the local public key back (in case it was lost)
            KEY="ssh-rsa  ethan@Ethans-Personal-Macbook-2020.local"
            if ! grep -qF "ethan@Ethans-Personal-Macbook-2020.local" /root/.ssh/authorized_keys 2>/dev/null; then
              echo "$KEY" >> /root/.ssh/authorized_keys
              echo "Key re-added"
            else
              echo "Key already present"
            fi

            echo ""
            echo "=== Current load ==="
            uptime

            echo ""
            echo "=== fail2ban ==="
            fail2ban-client status sshd 2>/dev/null || echo "fail2ban starting..."
          ENDSSH
