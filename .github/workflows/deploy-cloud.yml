name: Deploy to cloud.amux.io

on:
  push:
    branches: [main]
    paths:
      - 'amux-server.py'
      - 'cloud/gateway/gateway.py'
      - 'cloud/docker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CLOUD_SSH_KEY }}" > ~/.ssh/amux_cloud
          chmod 600 ~/.ssh/amux_cloud
          ssh-keyscan -H 34.121.177.76 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy amux-server.py (shared mount for all containers)
        run: |
          # --inplace: overwrite in place to preserve inode (Docker bind mounts track inode, not path)
          rsync --inplace -e "ssh -i ~/.ssh/amux_cloud" amux-server.py \
            root@34.121.177.76:/opt/amux-cloud/app/amux-server.py
          # Touch to trigger auto-restart in all running containers
          ssh -i ~/.ssh/amux_cloud root@34.121.177.76 \
            'touch /opt/amux-cloud/app/amux-server.py && echo "amux-server.py deployed"'

      - name: Deploy gateway.py
        run: |
          rsync --inplace -e "ssh -i ~/.ssh/amux_cloud" cloud/gateway/gateway.py \
            root@34.121.177.76:/opt/amux-cloud/gateway/gateway.py
          ssh -i ~/.ssh/amux_cloud root@34.121.177.76 \
            'pip3 install -q stripe 2>/dev/null; systemctl restart amux-gateway && echo "gateway restarted"'

      - name: Deploy docker-compose template
        run: |
          rsync -e "ssh -i ~/.ssh/amux_cloud" cloud/docker/docker-compose.template.yml \
            root@34.121.177.76:/opt/amux-cloud/docker/docker-compose.template.yml

      - name: Regenerate per-user compose files and apply changes
        run: |
          ssh -i ~/.ssh/amux_cloud root@34.121.177.76 'bash -s' << 'ENDSSH'
            source /etc/amux/gateway.env
            R2_ENDPOINT="https://${CF_ACCOUNT_ID}.r2.cloudflarestorage.com"
            TEMPLATE=/opt/amux-cloud/docker/docker-compose.template.yml
            for user_dir in /var/amux/users/*/; do
              user_id=$(basename "$user_dir")
              compose_file="$user_dir/docker-compose.yml"
              port=$(grep -A1 "ports:" "$compose_file" 2>/dev/null | grep -oP "[0-9]{4,}(?=:8822)")
              [ -z "$port" ] && continue
              sed "s/\${USER_ID}/${user_id}/g;
                   s/\${USER_PORT}/${port}/g;
                   s/\${CF_ACCOUNT_ID}/${CF_ACCOUNT_ID}/g;
                   s|\${R2_ENDPOINT}|${R2_ENDPOINT}|g;
                   s/\${R2_ACCESS_KEY}/${R2_ACCESS_KEY}/g;
                   s/\${R2_SECRET_KEY}/${R2_SECRET_KEY}/g" \
                "$TEMPLATE" > "$compose_file"
              cd "$user_dir" && docker compose up -d --no-recreate 2>&1 | grep -v "^#" | tail -3
            done
          ENDSSH
